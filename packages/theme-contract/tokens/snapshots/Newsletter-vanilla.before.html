<body class="theme-vanilla color-scheme-1" data-block="Newsletter" data-theme="vanilla">
<section class="relative w-full bg-[rgb(var(--color-bg))] text-[rgb(var(--color-text))]" style="padding-top:80px; padding-bottom:80px;">
  <div class="mx-auto max-w-[var(--container-max-width)] px-4 text-left">
    <div class="mx-auto max-w-[var(--size-newsletter-form-w,420px)] text-center items-center">
      <h2 class="[font-family:var(--font-heading)] text-[14px] leading-[16px] tracking-[0.05em] uppercase text-[rgb(var(--color-heading))] mb-2" data-puck-subsection-index="100" data-puck-subsection-field="heading">Подпишись на новости</h2>
      <p class="[font-family:var(--font-body)] text-[12px] leading-[15px] text-[rgb(var(--color-text))]/60 mb-5" data-puck-subsection-index="101" data-puck-subsection-field="text">Узнавай о новинках и акциях первым</p>
      <form class="flex flex-col items-stretch gap-3 w-full" method="POST" action="https://gateway.merfy.ru/api/storefront/newsletter/subscribe" data-newsletter-form data-puck-subsection-index="102" data-puck-subsection-field="form" data-form-layout="stacked">
        
        <input type="hidden" name="store_id" value="" data-newsletter-store-id>
        <input type="email" name="email" placeholder="Твой email" required class="flex-1 h-10 bg-transparent border-0 outline-none pr-10 text-[14px] [font-family:var(--font-body)] text-[rgb(var(--color-text))] placeholder:text-[rgb(var(--color-text))]/40">
        <button type="submit" class="inline-flex items-center justify-center h-12 px-6 rounded-[var(--radius-button)] [font-family:var(--font-body)] text-[14px] font-medium uppercase tracking-wide bg-[rgb(var(--color-button-bg))] text-[rgb(var(--color-button-text))] border border-[rgb(var(--color-button-border))] hover:bg-[rgb(var(--color-button-bg-hover))] hover:text-[rgb(var(--color-button-text-hover))] transition-colors" aria-label="Подписаться">
          Подписаться
        </button>
      </form>
    </div>
  </div>
</section>
<script>
  // Wire newsletter form to the storefront gateway endpoint.
  // - store_id comes from window.__MERFY_CONFIG__.shopId (set by BaseLayout).
  // - When __MERFY_CONFIG__.apiUrl differs from prod (preview / staging),
  //   we rebuild the action URL on the form so this block doesn't have to
  //   bake a host at build time.
  // This script keeps the form as a NATIVE POST submit — no fetch, no
  // success/error UI. {alreadySubscribed} / 429 handling lives in a future
  // JS-handler iteration; for MVP the browser shows the JSON response.
  (function () {
    function wire(form) {
      if (!form || form.__merfyNewsletterWired) return;
      form.__merfyNewsletterWired = true;
      var cfg = (typeof window !== 'undefined' && window.__MERFY_CONFIG__) || {};
      var hidden = form.querySelector('[data-newsletter-store-id]');
      if (hidden && cfg.shopId) {
        hidden.value = String(cfg.shopId);
      }
      if (cfg.apiUrl) {
        // Strip trailing slash, append the storefront path.
        var base = String(cfg.apiUrl).replace(/\/+$/, '');
        form.setAttribute('action', base + '/storefront/newsletter/subscribe');
      }
    }
    function init() {
      var forms = document.querySelectorAll('form[data-newsletter-form]');
      for (var i = 0; i < forms.length; i++) wire(forms[i]);
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', init);
    } else {
      init();
    }
  })();
</script>
